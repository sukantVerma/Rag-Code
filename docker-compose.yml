version: "3.8"

services:
  codedoc-rag:
    image: localhost/codedoc-rag:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: codedoc-rag
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - codedoc-data:/app/data
      - ./data/pdfs:/app/data/pdfs
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://localhost:8000
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  codedoc-data:
